{% if data.settings.visibilities['03 CAREER'] %}
<div class="folder" onclick="openFolder('03 CAREER')">
    <div class="tab-wrapper"><div class="tab">03 CAREER</div></div>
    <div class="folder-body">
        <h1>Career History</h1>
        <div style="margin-top:20px;">
            {% for c in data.content.careers %}
            <div class="career-item">
                <div class="timeline-icon">{{ c.icon or '📌' }}</div>
                <h3 style="margin:0 0 5px 0; font-size:1.3rem;">{{ c.company }}</h3>
                <p style="color:var(--text-muted); font-family: 'Montserrat', monospace; font-weight:700; font-size:0.9rem; margin-bottom:12px;">{{ c.period }}</p>
                <p style="color:var(--text-main); margin:0; font-size:1rem; line-height:1.7;">{{ c.role }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endif %}
