<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>접속 기한 만료</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            word-break: keep-all;
            overflow-wrap: break-word;
        }
        .container {
            border: 2px dashed #555;
            padding: 50px;
            border-radius: 10px;
        }
        h1 { color: #ff5555; }
        .dates { color: #aaa; margin-top: 20px; }
        a { color: #48C9B0; text-decoration: none; margin-top:30px; display:inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 열람 기한이 만료되었습니다</h1>
        <p>포트폴리오 파일 접근 권한이 제한되었습니다.</p>
        <div class="dates">
            허용된 열람 기간<br>
            <strong>{{ start }}</strong> ~ <strong>{{ end }}</strong>
        </div>
        <a href="/admin">관리자 모드 접속하기</a>
    </div>
</body>
</html>
