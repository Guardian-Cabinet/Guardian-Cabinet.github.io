name: Deploy Portfolio Static

on:
  push:
    branches: [ main ]
    paths:
      - 'portfolio_server/data.json'
      - 'portfolio_server/templates/index.html'
      - '**.py'
  workflow_dispatch:

# GITHUB_TOKEN에 쓰기 권한을 부여하여 별도의 PAT 없이도 스스로 빌드 전송 가능
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Jinja2

    - name: Render static index.html
      run: python render_portfolio.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -f index.html
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-render portfolio static page"
        git push
